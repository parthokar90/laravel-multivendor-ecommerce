services:

  # ─── PHP Laravel App ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multivendor_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - multivendor_net
    depends_on:
      - db

  # ─── Nginx Web Server ──────────────────────────────
  webserver:
    image: nginx:alpine
    container_name: multivendor_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - multivendor_net
    depends_on:
      - app

  # ─── MySQL Database ────────────────────────────────
  db:
    image: mysql:8.0
    container_name: multivendor_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: multivendor_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "33061:3306"   # host:container
    volumes:
      - mysql_data:/var/lib/mysql
      - ./multivendor_backup.sql:/docker-entrypoint-initdb.d/dump.sql  # auto import on first run
    networks:
      - multivendor_net

networks:
  multivendor_net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
